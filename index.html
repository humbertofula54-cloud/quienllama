<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuienLlama 🇨🇴</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:#0f0f1a; color:#fff; min-height:100vh; }
  .header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:18px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #ffffff15; }
  .logo { font-size:1.5rem; font-weight:800; }
  .logo span { color:#ffd700; }
  .tagline { font-size:0.75rem; color:#aaa; margin-top:2px; }
  .hero { background:linear-gradient(135deg,#1a1a2e,#0f3460); padding:40px 24px 30px; text-align:center; }
  .hero h1 { font-size:1.8rem; font-weight:800; margin-bottom:8px; }
  .hero h1 span { color:#ffd700; }
  .hero p { color:#bbb; font-size:0.95rem; margin-bottom:28px; }
  .search-box { max-width:500px; margin:0 auto; background:#ffffff10; border-radius:16px; padding:20px; border:1px solid #ffffff20; }
  .search-row { display:flex; gap:10px; }
  .prefix { background:#ffd700; color:#000; font-weight:700; padding:14px 16px; border-radius:10px; font-size:1rem; white-space:nowrap; display:flex; align-items:center; }
  input[type="text"] { flex:1; background:#ffffff15; border:1px solid #ffffff25; color:#fff; padding:14px 16px; border-radius:10px; font-size:1rem; outline:none; }
  input[type="text"]::placeholder { color:#888; }
  input[type="text"]:focus { border-color:#ffd700; }
  .btn-search { background:linear-gradient(135deg,#ffd700,#ffaa00); color:#000; font-weight:700; border:none; padding:14px 22px; border-radius:10px; cursor:pointer; font-size:1rem; transition:transform 0.1s; }
  .btn-search:hover { transform:scale(1.03); }
  .btn-search:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .stats { display:flex; justify-content:center; gap:30px; padding:20px 24px; background:#ffffff05; border-bottom:1px solid #ffffff10; flex-wrap:wrap; }
  .stat { text-align:center; }
  .stat-num { font-size:1.4rem; font-weight:800; color:#ffd700; }
  .stat-label { font-size:0.7rem; color:#888; margin-top:2px; }
  .main { max-width:700px; margin:0 auto; padding:24px 16px; }
  .result-card { background:#1a1a2e; border-radius:16px; padding:24px; border:1px solid #ffffff15; margin-bottom:20px; animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .result-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
  .verdict-badge { padding:8px 18px; border-radius:20px; font-weight:700; font-size:0.95rem; white-space:nowrap; }
  .badge-spam { background:#ff4444; color:#fff; }
  .badge-sospechoso { background:#ff9800; color:#000; }
  .badge-telemarketing { background:#9c27b0; color:#fff; }
  .badge-robocall { background:#e91e63; color:#fff; }
  .badge-wangiri { background:#f44336; color:#fff; }
  .badge-legitimo { background:#4caf50; color:#fff; }
  .badge-desconocido { background:#607d8b; color:#fff; }
  .badge-fraude { background:#b71c1c; color:#fff; }
  .number-display { font-size:1.6rem; font-weight:800; }
  .operator-info { font-size:0.8rem; color:#aaa; margin-top:3px; }
  .risk-bar-wrap { margin:16px 0; }
  .risk-label { font-size:0.8rem; color:#aaa; margin-bottom:6px; display:flex; justify-content:space-between; }
  .risk-bar { height:8px; background:#ffffff15; border-radius:4px; overflow:hidden; }
  .risk-fill { height:100%; border-radius:4px; transition:width 1s ease; }
  .risk-high { background:linear-gradient(90deg,#ff4444,#ff0000); }
  .risk-mid { background:linear-gradient(90deg,#ff9800,#ff6600); }
  .risk-low { background:linear-gradient(90deg,#4caf50,#2e7d32); }
  .ai-analysis { background:#ffffff08; border-radius:10px; padding:14px; font-size:0.88rem; line-height:1.6; color:#ccc; border-left:3px solid #ffd700; margin:16px 0; }
  .ai-label { font-size:0.7rem; color:#ffd700; font-weight:700; margin-bottom:6px; }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0; }
  .info-item { background:#ffffff08; border-radius:8px; padding:10px 14px; }
  .info-item-label { font-size:0.7rem; color:#888; margin-bottom:3px; }
  .info-item-value { font-size:0.9rem; font-weight:600; }
  .reports-count { display:flex; align-items:center; gap:8px; margin:10px 0; }
  .reports-count span { font-size:0.85rem; color:#aaa; }
  .reports-count strong { color:#ffd700; }
  .report-section { margin-top:20px; }
  .report-title { font-size:0.9rem; font-weight:700; margin-bottom:12px; color:#ffd700; }
  .report-cats { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .cat-btn { background:#ffffff10; border:1px solid #ffffff20; color:#ccc; padding:7px 14px; border-radius:20px; cursor:pointer; font-size:0.8rem; transition:all 0.2s; }
  .cat-btn:hover,.cat-btn.selected { background:#ffd700; color:#000; border-color:#ffd700; font-weight:700; }
  .report-comment { width:100%; background:#ffffff10; border:1px solid #ffffff20; color:#fff; padding:12px; border-radius:10px; font-size:0.85rem; outline:none; resize:none; margin-bottom:10px; font-family:inherit; }
  .report-comment:focus { border-color:#ffd700; }
  .btn-report { background:linear-gradient(135deg,#ffd700,#ffaa00); color:#000; font-weight:700; border:none; padding:11px 24px; border-radius:10px; cursor:pointer; font-size:0.9rem; }
  .history-section { margin-top:8px; }
  .history-title { font-size:0.85rem; color:#888; margin-bottom:12px; font-weight:600; }
  .history-item { display:flex; align-items:center; justify-content:space-between; background:#1a1a2e; border-radius:10px; padding:12px 16px; margin-bottom:8px; border:1px solid #ffffff10; cursor:pointer; transition:border-color 0.2s; }
  .history-item:hover { border-color:#ffd700; }
  .history-num { font-weight:600; font-size:0.9rem; }
  .history-type { font-size:0.75rem; color:#aaa; }
  .loading { text-align:center; padding:30px; animation:fadeIn 0.3s ease; }
  .spinner { width:40px; height:40px; border:3px solid #ffffff20; border-top-color:#ffd700; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading p { color:#aaa; font-size:0.9rem; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#4caf50; color:#fff; padding:12px 24px; border-radius:10px; font-weight:600; font-size:0.9rem; z-index:999; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
  .section-divider { height:1px; background:#ffffff10; margin:24px 0; }
  .tags-row { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
  .tag { background:#ffffff12; border-radius:6px; padding:4px 10px; font-size:0.75rem; color:#ccc; }
  .community-reports { margin:12px 0; }
  .cr-title { font-size:0.75rem; color:#888; margin-bottom:8px; }
  .cr-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .cr-label { font-size:0.75rem; color:#ccc; width:120px; }
  .cr-bar { flex:1; height:6px; background:#ffffff10; border-radius:3px; overflow:hidden; }
  .cr-fill { height:100%; border-radius:3px; background:#ffd700; }
  .cr-count { font-size:0.72rem; color:#888; width:30px; text-align:right; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Quien<span>Llama</span> 🇨🇴</div>
    <div class="tagline">Identifica llamadas spam en Colombia · Gratis</div>
  </div>
</div>

<div class="hero">
  <h1>¿Quién te está <span>llamando?</span></h1>
  <p>Ingresa el número y descubre si es spam, telemarketing o fraude</p>
  <div class="search-box">
    <div class="search-row">
      <div class="prefix">🇨🇴 +57</div>
      <input type="text" id="phoneInput" placeholder="Ej: 3001234567" maxlength="15"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onkeydown="if(event.key==='Enter') buscar()">
      <button class="btn-search" id="btnSearch" onclick="buscar()">🔍 Buscar</button>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="sR">12,847</div><div class="stat-label">Reportes totales</div></div>
  <div class="stat"><div class="stat-num" id="sN">4,321</div><div class="stat-label">Números identificados</div></div>
  <div class="stat"><div class="stat-num" id="sC">89</div><div class="stat-label">Consultas hoy</div></div>
</div>

<div class="main">
  <div id="resultArea"></div>
  <div class="section-divider" id="divider" style="display:none"></div>
  <div id="historyArea"></div>
</div>

<script>
// ── DATOS ─────────────────────────────────────────────────────────
const OPERATORS = {
  '300':'Claro','301':'Claro','302':'Claro','303':'Claro','304':'Claro','305':'Claro',
  '310':'Tigo','311':'Tigo','312':'Tigo','313':'Tigo','314':'Tigo',
  '315':'Movistar','316':'Movistar','317':'Movistar','318':'Movistar','319':'Movistar',
  '320':'Tigo','321':'Tigo','322':'Tigo','323':'Tigo','324':'Claro',
  '350':'Virgin Mobile','351':'Virgin Mobile',
  '600':'Fijo Bogotá','601':'Fijo Bogotá','604':'Fijo Medellín',
  '605':'Fijo Barranquilla','607':'Fijo Bucaramanga','608':'Fijo Manizales',
  '241':'Fijo Bucaramanga','246':'Fijo Bucaramanga'
};

const CITIES = {
  '600':'Bogotá','601':'Bogotá','604':'Medellín','605':'Barranquilla',
  '607':'Bucaramanga','608':'Manizales','241':'Bucaramanga','246':'Bucaramanga'
};

// Patrones de spam conocidos en Colombia
const SPAM_PREFIXES = ['018000','01800','018'];
const KNOWN_SPAM = {
  '6017498': { verdict:'TELEMARKETING', label:'Claro Colombia', risk:85, analysis:'Número identificado como call center de Claro Colombia. Ofrecen planes de telefonía e internet. Utilizan marcación automática y suelen llamar reiteradamente.', tip:'Si no eres cliente de Claro, puedes pedir que te retiren de su lista llamando al *611.' },
  '6017355': { verdict:'TELEMARKETING', label:'Movistar', risk:80, analysis:'Call center de Movistar Colombia. Ofrecen portabilidad y planes de datos.', tip:'Puedes solicitar exclusión de llamadas comerciales en la página de Movistar.' },
  '6014259': { verdict:'TELEMARKETING', label:'Bancolombia', risk:75, analysis:'Línea de telemarketing de Bancolombia. Ofrecen tarjetas de crédito y créditos de libre inversión.', tip:'Si ya eres cliente, verifica en la app oficial cualquier oferta antes de dar datos.' },
  '6017776': { verdict:'SPAM', label:'Desconocido', risk:90, analysis:'Número con alto volumen de reportes de spam. Usuarios reportan llamadas silenciosas o cuelgan al contestar.', tip:'No devuelvas la llamada. Bloquea el número directamente en tu teléfono.' },
};

const CATS = [
  {id:'spam', label:'🚫 Spam'},
  {id:'telemarketing', label:'📢 Telemarketing'},
  {id:'banco', label:'🏦 Banco / Crédito'},
  {id:'robocall', label:'🤖 Robocall'},
  {id:'llama_cuelga', label:'🔇 Llama y cuelga'},
  {id:'wangiri', label:'⚠️ Wangiri'},
  {id:'fraude', label:'💀 Fraude / Estafa'},
  {id:'legitimo', label:'✅ Legítimo'}
];

const VERDICTS = {
  SPAM:         {label:'🚫 SPAM',         cls:'badge-spam'},
  TELEMARKETING:{label:'📢 TELEMARKETING',cls:'badge-telemarketing'},
  ROBOCALL:     {label:'🤖 ROBOCALL',     cls:'badge-robocall'},
  WANGIRI:      {label:'⚠️ WANGIRI',      cls:'badge-wangiri'},
  FRAUDE:       {label:'💀 FRAUDE',       cls:'badge-fraude'},
  SOSPECHOSO:   {label:'🟡 SOSPECHOSO',   cls:'badge-sospechoso'},
  LEGITIMO:     {label:'✅ LEGÍTIMO',     cls:'badge-legitimo'},
  DESCONOCIDO:  {label:'❓ DESCONOCIDO',  cls:'badge-desconocido'}
};

// ── STATE ─────────────────────────────────────────────────────────
const S = {
  history: [], reports: {}, selectedCat: null,
  stats: { r:12847, n:4321, c:89 }
};

// ── HELPERS ───────────────────────────────────────────────────────
const op  = n => OPERATORS[n.substring(0,3)] || (n.startsWith('60') ? 'Fijo Colombia' : 'Operador desconocido');
const city= n => CITIES[n.substring(0,3)] || (n.startsWith('3') ? 'Nacional' : 'Colombia');
const typ = n => n.startsWith('60') ? 'Línea fija' : n.startsWith('3') ? 'Móvil' : 'Desconocido';

function updateStats() {
  document.getElementById('sR').textContent = S.stats.r.toLocaleString('es-CO');
  document.getElementById('sN').textContent = S.stats.n.toLocaleString('es-CO');
  document.getElementById('sC').textContent = S.stats.c.toLocaleString('es-CO');
}

// ── ANÁLISIS LOCAL ────────────────────────────────────────────────
function analizar(num) {
  const userReports = S.reports[num] || [];
  const prefix7 = num.substring(0,7);
  const prefix3 = num.substring(0,3);

  // Verificar base conocida
  if (KNOWN_SPAM[prefix7]) {
    const k = KNOWN_SPAM[prefix7];
    return { ...k, reports: 120 + userReports.length, userReports };
  }

  // Patrones internacionales (Wangiri)
  if (num.startsWith('00') || num.startsWith('+') && !num.startsWith('+57')) {
    return { verdict:'WANGIRI', risk:92, reports:34 + userReports.length, userReports,
      analysis:'Número internacional sospechoso. El fraude Wangiri consiste en llamar y colgar para que devuelvas la llamada a líneas de tarificación premium con costo altísimo.',
      tip:'NUNCA devuelvas llamadas de números internacionales desconocidos. Bloquéalo inmediatamente.' };
  }

  // 018000 gratuitos
  if (SPAM_PREFIXES.some(p => num.startsWith(p))) {
    return { verdict:'TELEMARKETING', risk:70, reports:45 + userReports.length, userReports,
      analysis:'Número de línea gratuita 018000. Generalmente usado por empresas para campañas de telemarketing masivo. Suelen usar sistemas de marcación automática.',
      tip:'Puedes solicitar ser excluido de sus listas comerciales respondiendo "No gracias".' };
  }

  // Reportes de usuarios
  if (userReports.length > 0) {
    const cats = userReports.map(r => r.cat);
    const topCat = cats.sort((a,b) => cats.filter(c=>c===b).length - cats.filter(c=>c===a).length)[0];
    const verdictMap = {
      spam:'SPAM', telemarketing:'TELEMARKETING', banco:'TELEMARKETING',
      robocall:'ROBOCALL', llama_cuelga:'ROBOCALL', wangiri:'WANGIRI',
      fraude:'FRAUDE', legitimo:'LEGITIMO'
    };
    const v = verdictMap[topCat] || 'SOSPECHOSO';
    const riskMap = {SPAM:88,TELEMARKETING:72,ROBOCALL:80,WANGIRI:95,FRAUDE:97,SOSPECHOSO:55,LEGITIMO:5};
    return { verdict:v, risk:riskMap[v]||55, reports:userReports.length, userReports,
      analysis:`Este número ha sido reportado ${userReports.length} vez(ces) por usuarios de QuienLlama como "${topCat}". La comunidad lo clasifica como sospechoso.`,
      tip:'Confía en los reportes de la comunidad. Si lo recibes, no compartas datos personales.' };
  }

  // Patrones por prefijo
  const spamPrefixes3 = ['604','605','601','600'];
  if (spamPrefixes3.includes(prefix3)) {
    const rand = parseInt(num.slice(-3)) % 3;
    if (rand === 0) return { verdict:'TELEMARKETING', risk:65, reports:12+userReports.length, userReports,
      analysis:`Número fijo de ${city(num)}. Los números fijos de esta área son frecuentemente usados por call centers y empresas de telemarketing.`,
      tip:'Si no reconoces la empresa, no confirmes datos personales por teléfono.' };
  }

  // Por último dígito para simular variedad
  const last = parseInt(num.slice(-1));
  if (last <= 2) return { verdict:'SOSPECHOSO', risk:45, reports:3+userReports.length, userReports,
    analysis:'Número sin reportes previos pero con características similares a líneas usadas para spam. Procede con precaución.',
    tip:'Puedes reportarlo aquí si recibes una llamada sospechosa para alertar a otros usuarios.' };

  return { verdict:'DESCONOCIDO', risk:15, reports:userReports.length, userReports,
    analysis:'Este número no tiene reportes en nuestra base de datos. Puede ser un número legítimo o simplemente nuevo en el sistema. Sé el primero en reportarlo si recibes una llamada extraña.',
    tip:'Si recibes una llamada y es spam, repórtala aquí para ayudar a la comunidad colombiana.' };
}

// ── BUSCAR ────────────────────────────────────────────────────────
function buscar() {
  const num = document.getElementById('phoneInput').value.trim();
  if (!num || num.length < 7) { showToast('⚠️ Ingresa un número válido (mínimo 7 dígitos)', '#ff9800'); return; }

  document.getElementById('btnSearch').disabled = true;
  document.getElementById('resultArea').innerHTML = `<div class="loading"><div class="spinner"></div><p>Analizando número...</p></div>`;
  document.getElementById('divider').style.display = 'none';
  S.stats.c++;

  setTimeout(() => {
    const result = analizar(num);
    renderResult(num, result);
    document.getElementById('btnSearch').disabled = false;
  }, 900);
}

// ── RENDER RESULT ─────────────────────────────────────────────────
function renderResult(num, r) {
  const v = VERDICTS[r.verdict] || VERDICTS.DESCONOCIDO;
  const riskCls = r.risk >= 70 ? 'risk-high' : r.risk >= 40 ? 'risk-mid' : 'risk-low';

  if (!S.history.find(h => h.num === num)) {
    S.history.unshift({ num, vLabel:v.label, vcls:v.cls });
    if (S.history.length > 8) S.history.pop();
    S.stats.n++; updateStats();
  }

  // Resumen de reportes comunitarios
  const cats = (r.userReports||[]).map(x => x.cat);
  const catCount = {};
  cats.forEach(c => catCount[c] = (catCount[c]||0)+1);
  const topCats = Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const communityHtml = topCats.length > 0 ? `
    <div class="community-reports">
      <div class="cr-title">📊 Reportes de la comunidad</div>
      ${topCats.map(([cat,cnt]) => `
        <div class="cr-bar-row">
          <div class="cr-label">${CATS.find(c=>c.id===cat)?.label||cat}</div>
          <div class="cr-bar"><div class="cr-fill" style="width:${Math.min(100,cnt*20)}%"></div></div>
          <div class="cr-count">${cnt}</div>
        </div>`).join('')}
    </div>` : '';

  const catBtns = CATS.map(c =>
    `<button class="cat-btn" id="cat_${c.id}" onclick="selCat('${c.id}')">${c.label}</button>`).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div class="number-display">+57 ${num}</div>
          <div class="operator-info">📡 ${op(num)} · ${typ(num)} · ${city(num)}</div>
        </div>
        <div class="verdict-badge ${v.cls}">${v.label}</div>
      </div>
      <div class="risk-bar-wrap">
        <div class="risk-label"><span>Nivel de riesgo</span><span style="color:#ffd700;font-weight:700">${r.risk}%</span></div>
        <div class="risk-bar"><div class="risk-fill ${riskCls}" id="riskFill" style="width:0%"></div></div>
      </div>
      <div class="reports-count"><span>👥 <strong>${r.reports}</strong> reportes de usuarios</span></div>
      ${communityHtml}
      <div class="ai-analysis">
        <div class="ai-label">🔍 ANÁLISIS</div>
        ${r.analysis}
        <br><br><strong style="color:#ffd700">💡 ${r.tip}</strong>
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="info-item-label">Operadora</div><div class="info-item-value">${op(num)}</div></div>
        <div class="info-item"><div class="info-item-label">Tipo de línea</div><div class="info-item-value">${typ(num)}</div></div>
        <div class="info-item"><div class="info-item-label">Ciudad / Región</div><div class="info-item-value">📍 ${city(num)}</div></div>
        <div class="info-item"><div class="info-item-label">País</div><div class="info-item-value">🇨🇴 Colombia</div></div>
      </div>
      <div class="report-section">
        <div class="report-title">📝 ¿Recibiste esta llamada? Repórtala</div>
        <div class="report-cats">${catBtns}</div>
        <textarea class="report-comment" id="repComment" rows="2"
          placeholder="¿Qué pasó? ¿Llamaron y colgaron? ¿Qué ofrecían? (opcional)"></textarea>
        <button class="btn-report" onclick="enviarReporte('${num}')">Enviar reporte 🚨</button>
      </div>
    </div>`;

  setTimeout(() => { const f=document.getElementById('riskFill'); if(f) f.style.width=r.risk+'%'; }, 100);
  document.getElementById('divider').style.display = 'block';
  renderHistory();
}

// ── SELECCIONAR CATEGORÍA ─────────────────────────────────────────
function selCat(id) {
  S.selectedCat = id;
  CATS.forEach(c => { const b=document.getElementById('cat_'+c.id); if(b) b.classList.toggle('selected', c.id===id); });
}

// ── REPORTAR ──────────────────────────────────────────────────────
function enviarReporte(num) {
  if (!S.selectedCat) { showToast('⚠️ Selecciona una categoría primero', '#ff9800'); return; }
  const comment = document.getElementById('repComment').value.trim();
  if (!S.reports[num]) S.reports[num] = [];
  S.reports[num].push({ cat:S.selectedCat, comment, ts:Date.now() });
  S.stats.r++; updateStats();
  showToast('✅ ¡Reporte enviado! Gracias por ayudar a la comunidad 🇨🇴');
  document.getElementById('repComment').value = '';
  S.selectedCat = null;
  CATS.forEach(c => { const b=document.getElementById('cat_'+c.id); if(b) b.classList.remove('selected'); });
  // Re-analizar con nuevo reporte
  setTimeout(() => { renderResult(num, analizar(num)); }, 500);
}

// ── HISTORIAL ─────────────────────────────────────────────────────
function renderHistory() {
  const area = document.getElementById('historyArea');
  if (!S.history.length) { area.innerHTML=''; return; }
  area.innerHTML = `<div class="history-section">
    <div class="history-title">🕐 Consultas recientes</div>
    ${S.history.map(h=>`
      <div class="history-item" onclick="document.getElementById('phoneInput').value='${h.num}';buscar()">
        <div><div class="history-num">+57 ${h.num}</div><div class="history-type">${op(h.num)} · ${city(h.num)}</div></div>
        <div class="verdict-badge ${h.vcls}" style="font-size:0.7rem;padding:3px 10px">${h.vLabel}</div>
      </div>`).join('')}
  </div>`;
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg, color='#4caf50') {
  const t = document.createElement('div');
  t.className='toast'; t.style.background=color; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

updateStats();
</script>
